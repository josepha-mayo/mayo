name: Hourly Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Run every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        env:
          APP_ID: ${{ secrets.APP_ID }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI2_API_KEY: ${{ secrets.GEMINI2_API_KEY || secrets.GEMINI_API_KEY }}  # Forward as fallback if distinct not set
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GEMINI_FALLBACK_API_KEY: ${{ secrets.GEMINI_FALLBACK_API_KEY }}
          GEMINI2_FALLBACK_API_KEY: ${{ secrets.GEMINI2_FALLBACK_API_KEY }}
          GROK_FALLBACK_API_KEY: ${{ secrets.GROK_FALLBACK_API_KEY }}
          GEMINI_NEWCRONS_API_KEY: ${{ secrets.GEMINI_NEWCRONS_API_KEY }}
          GROQ_NEWCRONS_API_KEY: ${{ secrets.GROQ_NEWCRONS_API_KEY }}
          GROK_2ND_EXECUTOR_API_KEY: ${{ secrets.GROK_2ND_EXECUTOR_API_KEY }}
          GEMINI_EXECUTOR_API_KEY: ${{ secrets.GEMINI_EXECUTOR_API_KEY }}
          GEMINI3_FALLBACK_API_KEY: ${{ secrets.GEMINI3_FALLBACK_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          FIREWORKS2_API_KEY: ${{ secrets.FIREWORKS2_API_KEY }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          BOT_REPO_NAME: ${{ secrets.BOT_REPO_NAME }}
          CO_AUTHOR_NAME: ${{ secrets.CO_AUTHOR_NAME }}
          CO_AUTHOR_EMAIL: ${{ secrets.CO_AUTHOR_EMAIL }}
        run: python run_cron.py
